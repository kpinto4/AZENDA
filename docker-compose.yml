# PostgreSQL local: datos persistentes en ./api/data/postgres
# Primera vez: npm run db:setup  (Docker + create-db + bootstrap; requiere Docker)
# Con Docker cada vez: npm run dev:docker  (npm run pg:up busca docker.exe en rutas tipicas de Windows)
# Si sigue fallando: variable de entorno DOCKER_CLI_PATH = ruta completa a docker.exe
# API+web (Postgres ya en marcha en 5432): npm run dev  (antes prueba TCP con npm run check:pg)
# Sin Postgres: npm run dev:sqlite
services:
  postgres:
    image: postgres:16
    container_name: azenda-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azenda
    volumes:
      - ./api/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d azenda']
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 15s
