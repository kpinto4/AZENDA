<div class="super-shell" [class.nav-open]="menuOpen()">
  <div class="super-sidebar-backdrop" (click)="closeMenu()" aria-hidden="true"></div>
  <aside class="super-sidebar" id="super-nav-drawer" role="navigation" aria-label="Menú Super Admin">
    <div class="drawer-head-mobile">
      <button type="button" class="drawer-close" (click)="closeMenu()" aria-label="Cerrar menú">×</button>
    </div>
    <div class="brand">Azenda <span>Super Admin</span></div>
    <nav (pointerdown)="onSidebarPointerDown($event)">
      <div class="nav-group">
        <p class="nav-group-title">General</p>
        <div class="nav-links-grid">
          <a routerLink="/super/panel" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            ><span class="nav-ico" aria-hidden="true">◆</span> Dashboard</a
          >
          <a routerLink="/super/estadisticas" routerLinkActive="active"
            ><span class="nav-ico" aria-hidden="true">▤</span> Estadísticas</a
          >
        </div>
      </div>
      <div class="nav-group">
        <p class="nav-group-title">Administración</p>
        <div class="nav-links-grid">
          <a routerLink="/super/tenants" routerLinkActive="active"
            ><span class="nav-ico" aria-hidden="true">▣</span> Tenants</a
          >
          <a routerLink="/super/planes" routerLinkActive="active"
            ><span class="nav-ico" aria-hidden="true">$</span> Precios por plan</a
          >
          <a routerLink="/super/configuracion" routerLinkActive="active"
            ><span class="nav-ico" aria-hidden="true">◇</span> Sitio y moneda</a
          >
          <a routerLink="/super/modulos" routerLinkActive="active"
            ><span class="nav-ico" aria-hidden="true">⚙</span> Módulos</a
          >
          <a routerLink="/super/usuarios" routerLinkActive="active"
            ><span class="nav-ico" aria-hidden="true">◎</span> Usuarios</a
          >
        </div>
      </div>
    </nav>
    <div class="foot">
      <span>{{ session.userName() }}</span>
      <a routerLink="/" class="link-home">Ir a landing</a>
      <button type="button" class="btn-out" (click)="logout()">Salir</button>
    </div>
  </aside>
  <main class="super-main">
    <header class="mobile-shell-bar">
      <button
        type="button"
        class="mobile-menu-toggle"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="super-nav-drawer"
      >
        Menú
      </button>
      <span class="mobile-shell-title">Super Admin</span>
    </header>
    <div class="super-main-stage">
      <router-outlet />
    </div>
  </main>
</div>
