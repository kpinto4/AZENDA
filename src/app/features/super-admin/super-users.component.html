<div class="az-container az-page super-ui-page">
  <header class="super-ui-header">
    <div class="super-ui-header-main">
      <div class="super-ui-title-row">
        <h1 class="super-ui-title">Usuarios globales</h1>
        <span class="super-ui-badge super-ui-badge--neutral">Mock</span>
      </div>
      <p class="super-ui-lead">Simulación: alta en memoria. En producción: invitaciones, verificación y permisos reales.</p>
    </div>
  </header>

  <div class="super-ui-surface">
    <h3 class="super-ui-surface-title">Añadir usuario (mock)</h3>
    <form [formGroup]="form" (ngSubmit)="add()" class="user-form">
      <div>
        <label class="az-label" for="em">Correo</label>
        <input id="em" class="az-input wide" type="email" formControlName="email" />
      </div>
      <div>
        <label class="az-label" for="role">Rol</label>
        <div id="role" class="role-pills" role="radiogroup" aria-label="Rol">
          @for (r of roles; track r) {
            <label class="role-pill">
              <input type="radio" formControlName="role" [value]="r" />
              <span>{{ r }}</span>
            </label>
          }
        </div>
      </div>
      <div class="grow">
        <label class="az-label" for="tl">Tenant (etiqueta)</label>
        <input id="tl" class="az-input wide" formControlName="tenantLabel" />
      </div>
      <button type="submit" class="az-btn az-btn-primary end">Añadir</button>
    </form>
  </div>

  <div class="az-table-wrap mt">
    <table class="az-table">
      <thead>
        <tr>
          <th>Correo</th>
          <th>Rol</th>
          <th>Tenant</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (u of data.platformUsers(); track u.id) {
          <tr>
            <td>{{ u.email }}</td>
            <td><span class="az-badge">{{ u.role }}</span></td>
            <td>{{ u.tenantLabel }}</td>
            <td>
              <button type="button" class="az-btn az-btn-ghost small" (click)="data.removePlatformUser(u.id)">
                Quitar
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
