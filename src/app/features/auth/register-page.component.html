<div class="auth-page">
  <div class="az-card auth-card">
    <a routerLink="/" class="back">← Volver</a>
    <h1>Crear cuenta</h1>
    <p class="hint">
      Simulación: se crea un <strong>tenant</strong> en memoria y entras directo al panel. Al recargar la página los datos
      mock se pierden salvo que uses “Restablecer demo” en la landing.
    </p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="az-label" for="business">Nombre del negocio</label>
      <input id="business" class="az-input" type="text" formControlName="business" />
      <label class="az-label" for="email">Correo</label>
      <input id="email" class="az-input" type="email" formControlName="email" autocomplete="email" />
      <label class="az-label" for="password">Contraseña</label>
      <input id="password" class="az-input" type="password" formControlName="password" autocomplete="new-password" />
      <button type="submit" class="az-btn az-btn-primary full">Crear y entrar (simulado)</button>
    </form>
    <p class="footer">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/iniciar-sesion">Entrar</a>
    </p>
  </div>
</div>
