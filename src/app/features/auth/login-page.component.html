<div class="auth-page">
  <div class="az-card auth-card">
    <a routerLink="/" class="back">← Volver</a>
    <h1>Iniciar sesión</h1>
    <p class="hint">
      Demo: <strong>super</strong> → Super Admin · <strong>spa</strong> → Spa (sin inventario) ·
      <strong>clinica</strong> o <strong>trial</strong> → Clínica pausada · <strong>empleado</strong> · otro correo →
      Barbería Centro.
    </p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="az-label" for="email">Correo</label>
      <input id="email" class="az-input" type="email" formControlName="email" autocomplete="username" />
      <label class="az-label" for="password">Contraseña</label>
      <input
        id="password"
        class="az-input"
        type="password"
        formControlName="password"
        autocomplete="current-password"
      />
      @if (message) {
        <p class="msg">{{ message }}</p>
      }
      <button type="submit" class="az-btn az-btn-primary full">Entrar</button>
    </form>
    <p class="footer">
      ¿Nuevo aquí?
      <a routerLink="/auth/registro">Crear cuenta</a>
    </p>
  </div>
</div>
